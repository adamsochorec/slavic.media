name: Frontend Tests

on:
  push:
    branches: ['**']
    paths:
      - 'frontend/**'

jobs:
  test-frontend:
    name: Frontend tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.JS ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: NPM install, build and test
        run: |
          cd frontend
          npm install
          npm test
